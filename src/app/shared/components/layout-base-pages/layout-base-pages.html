<div class="flex md:flex-row md:justify-content-between md:align-items-center flex-column gap-2">
  <div class="flex flex-column">
    <h1 class="font-semibold text-2xl mb-1" [class]="colorTitle()">{{ title() }}</h1>
    @if (subtitle()) {
      <div>
        <small class="text-base" [class]="colorSubtitle()">{{ subtitle() }}</small>
      </div>
    }
  </div>
  @if (buttonActionLabel()) {
    <p-button
      styleClass="md:w-auto w-full"
      [label]="buttonActionLabel()"
      (click)="onButtonActionClick()"
      class="md:w-auto w-full button-aplicacao-style"
    ></p-button>
  }
</div>

<div class="mt-2">
  <ng-content></ng-content>
</div>
