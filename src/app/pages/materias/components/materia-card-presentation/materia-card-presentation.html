<div class="mt-3">
  <p-card>
    <div class="flex flex-row justify-content-between">
      <div class="flex flex-column gap-3 mr-4">
        <h2 class="text-xl font-medium">{{ materia().nome }}</h2>
        <div>
          <p class="text-base font-light text-justify">
            {{ materia().descricao || '-' }}
          </p>
        </div>
        <div class="flex flex-row gap-3">
          <p class="text-sm font-medium">{{ getTextAssuntosRelacionados() }}</p>
          <p class="text-sm font-medium">{{ getTextQuestoesRelacionadas() }}</p>
        </div>
      </div>
      <div class="flex flex-column md:flex-row justify-content-between align-items-center gap-2">
        <p-button
          size="small"
          rounded="true"
          variant="text"
          severity="info"
          pTooltip="Editar"
          icon="pi pi-pencil"
          aria-label="Editar"
          tooltipPosition="top"
          (onClick)="onEditar()"
        />
        <p-button
          size="small"
          rounded="true"
          variant="text"
          severity="danger"
          icon="pi pi-trash"
          pTooltip="Excluir"
          aria-label="Excluir"
          tooltipPosition="top"
          (onClick)="onExcluir()"
        />
      </div>
    </div>
  </p-card>
</div>
